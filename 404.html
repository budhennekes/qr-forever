<style>
  :root{--paper:#f5f7f6;--ink:#14201c;--soft:#586661;--accent:#2563eb;--accent2:#38bdf8;--card:#fff;--line:#e1e8e4;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Public Sans",-apple-system,sans-serif;background:var(--paper);color:var(--ink);
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:28px;line-height:1.6;position:relative}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;

  .card{max-width:460px;width:100%;text-align:center;position:relative;z-index:1}
  .glyph{width:66px;height:66px;margin:0 auto 22px}
  .glyph svg{width:100%;height:100%;display:block;color:var(--accent)}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,7vw,42px);line-height:1.08;letter-spacing:-.02em;margin-bottom:12px}
  p{font-size:17px;color:var(--soft);max-width:400px;margin:0 auto 26px}
  p b{color:var(--ink);font-weight:600}
  .btn{display:inline-block;background:var(--ink);color:var(--paper);text-decoration:none;font-weight:700;
    font-size:16px;padding:14px 26px;border-radius:14px;transition:transform .1s}
  .btn:active{transform:translateY(1px)}
  .kicker{margin-top:22px;font-size:12.5px;color:#93a09a}
